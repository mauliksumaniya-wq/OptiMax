<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiMax AI | Fixed Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-5 flex flex-col items-center">

    <div class="max-w-2xl w-full glass p-8 rounded-2xl text-center mt-10">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">OptiMax AI</h1>
        <p class="text-gray-400 mb-6 text-sm">Image Upscaler for BCA Semester 3 Project</p>

        <!-- Status Light -->
        <div class="mb-5 flex justify-center items-center gap-2">
            <div id="statusDot" class="w-3 h-3 bg-red-500 rounded-full"></div>
            <span id="statusText" class="text-xs text-gray-400">Loading AI Libraries...</span>
        </div>

        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <button onclick="document.getElementById('fileInput').click()" class="bg-gray-700 px-5 py-2 rounded-lg mb-4 hover:bg-gray-600">Select Image</button>
        
        <p id="fileName" class="text-xs text-blue-300 mb-4"></p>

        <button id="upscaleBtn" disabled class="w-full bg-blue-600 disabled:bg-gray-800 p-4 rounded-xl font-bold shadow-lg">
            ⚡ Start AI Enhancement
        </button>

        <div id="loader" class="hidden mt-4 text-yellow-500 animate-pulse text-sm">AI is processing... please wait...</div>

        <div class="mt-10 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <p class="text-xs text-gray-500 mb-2 uppercase">Original</p>
                <img id="inputImg" class="rounded-lg border border-gray-700 w-full">
            </div>
            <div>
                <p class="text-xs text-blue-500 mb-2 uppercase">AI Result</p>
                <img id="outputImg" class="rounded-lg border border-blue-900 w-full">
                <a id="downloadBtn" class="hidden mt-4 block bg-green-600 p-2 rounded text-sm font-bold">Download Result</a>
            </div>
        </div>
    </div>

    <!-- NEW FIXED LIBRARY LINKS (Using Unpkg CDN) -->
    <!-- 1. TensorFlow.js Core -->
    <script src="https://unpkg.com/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <!-- 2. The AI Model -->
    <script src="https://unpkg.com/@upscalerjs/default-model@0.5.0/dist/index.min.js"></script>
    <!-- 3. The Upscaler Engine -->
    <script src="https://unpkg.com/upscaler@0.12.1/dist/browser/upscaler.min.js"></script>

    <script>
        // Check if libraries loaded correctly
        window.onload = function() {
            if (typeof Upscaler !== 'undefined') {
                document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-green-500');
                document.getElementById('statusText').innerText = "AI Ready to Work!";
                console.log("Success: Upscaler Loaded!");
            } else {
                document.getElementById('statusText').innerText = "Error: Libraries blocked. Use a different browser.";
                console.error("Error: Upscaler library failed to load.");
            }
        };

        const fileInput = document.getElementById('fileInput');
        const upscaleBtn = document.getElementById('upscaleBtn');
        const inputImg = document.getElementById('inputImg');
        const outputImg = document.getElementById('outputImg');
        const loader = document.getElementById('loader');
        const downloadBtn = document.getElementById('downloadBtn');

        let upscalerInstance;

        try {
            upscalerInstance = new Upscaler();
        } catch (e) {
            console.log("Waiting for library...");
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').innerText = "Selected: " + file.name;
                const reader = new FileReader();
                reader.onload = (event) => {
                    inputImg.src = event.target.result;
                    upscaleBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        upscaleBtn.addEventListener('click', async () => {
            loader.classList.remove('hidden');
            upscaleBtn.disabled = true;
            
            try {
                // Upscale using smaller patches for Windows 7 memory safety
                const result = await upscalerInstance.upscale(inputImg.src, {
                    patchSize: 48,
                    padding: 2
                });

                outputImg.src = result;
                downloadBtn.href = result;
                downloadBtn.download = "optimax_enhanced.png";
                downloadBtn.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                alert("AI Error: " + err.message);
            } finally {
                loader.classList.add('hidden');
                upscaleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
